name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish C# Project
        run: |
          dotnet publish -c Release -r win-x64

      - name: Sign the Build
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:CERTIFICATE_BASE64 -or -not $env:CERTIFICATE_PASSWORD) {
              Write-Host "Certificate secrets not found, skipping signing."
              exit 0
          }
          
          # Decode the certificate
          $pfxBytes = [System.Convert]::FromBase64String($env:CERTIFICATE_BASE64)
          $pfxPath = Join-Path -Path $env:RUNNER_TEMP -ChildPath "certificate.pfx"
          [System.IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          
          # Find signtool
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1 -ExpandProperty FullName
          
          if (-not $signtool) {
              Write-Host "Signtool not found. Please install Windows SDK or find signtool.exe."
              exit 1
          }
          
          $fileToSign = "bin\Release\net10.0-windows\win-x64\publish\EldenRingAIOLauncher.exe"
          
          if (Test-Path $fileToSign) {
              & $signtool sign /f $pfxPath /p $env:CERTIFICATE_PASSWORD /fd SHA256 /t "http://timestamp.digicert.com" $fileToSign
              if ($LASTEXITCODE -eq 0) {
                  Write-Host "Successfully signed: $fileToSign"
              } else {
                  Write-Host "Failed to sign: $fileToSign"
                  exit 1
              }
          } else {
              Write-Host "File not found: $fileToSign"
              exit 1
          }
          
          # Clean up
          Remove-Item -Path $pfxPath -Force


      - name: Create ZIP archive
        run: |
          $publishPath = "bin\Release\net10.0-windows\win-x64\publish"
          $zipPath = "EldenRingAIOLauncher.zip"
          Compress-Archive -Path "$publishPath\*" -DestinationPath $zipPath -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: EldenRingAIOLauncher.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to NexusMods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.8
        if: startsWith(github.ref, 'refs/tags/')
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_id: ${{ secrets.NEXUSMODS_FILE_ID }}
          filename: EldenRingAIOLauncher.zip
          version: ${{ github.ref_name }}
          category: main
