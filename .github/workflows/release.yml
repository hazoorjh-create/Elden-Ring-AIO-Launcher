name: Build and Release

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish C# Project
        run: |
          dotnet publish -c Release -r win-x64

      - name: Create ZIP archive
        run: |
          $publishPath = "bin\Release\net10.0-windows\win-x64\publish"
          $zipPath = "EldenRingAIOLauncher.zip"
          Compress-Archive -Path "$publishPath\EldenRingAIOLauncher.exe", "Readme.txt" -DestinationPath $zipPath -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: EldenRingAIOLauncher.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
